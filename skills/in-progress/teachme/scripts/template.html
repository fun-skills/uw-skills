<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8">
    <title>__TITLE__</title>
    <style>
      markdown-viewer, #fallback { display: block; max-width: 48rem; margin: 2rem auto; padding: 0 1.5rem; }
    </style>
    <style id="fallback-css" media="not all">
      html { font-size: 15px; }
      body { font-family: "Iowan Old Style", Georgia, Cambria, "Times New Roman", Times, serif; background: #fffff8; color: #111; line-height: 1.55; }
      h1, h2, h3, h4 { font-weight: 400; line-height: 1.2; margin: 2.2rem 0 0.6rem; }
      h1 { font-size: 2.2rem; } h2 { font-size: 1.5rem; } h3 { font-size: 1.2rem; }
      p, ul, ol, blockquote, pre { margin: 0.9rem 0; }
      blockquote { border-left: 2px solid #aaa; padding-left: 1rem; color: #444; font-style: italic; }
      a { color: #111; text-decoration: underline; text-underline-offset: 2px; }
      a:hover { color: #c33; }
      code { font-family: Consolas, "Liberation Mono", Menlo, monospace; font-size: 0.92em; background: #f4f4ec; padding: 0.1em 0.3em; border-radius: 2px; }
      pre { background: #f4f4ec; padding: 0.8rem 1rem; overflow-x: auto; line-height: 1.4; }
      pre code { background: none; padding: 0; }
      hr { border: none; border-top: 1px solid #ddd; margin: 2rem 0; }
      table { border-collapse: collapse; margin: 1rem 0; }
      th, td { border-bottom: 1px solid #ddd; padding: 0.4rem 0.8rem; text-align: left; }
    </style>
  </head>
  <body>
    <markdown-viewer id="viewer" mode="inline"></markdown-viewer>
    <article id="fallback" hidden></article>

    <script id="src" type="text/markdown">
__MD__
    </script>

    <script>
      const md = document.getElementById('src').textContent
      const viewer = document.getElementById('viewer')
      const fallback = document.getElementById('fallback')

      let tries = 0
      ;(function tick() {
        if (customElements.get('markdown-viewer') && typeof viewer.render === 'function') {
          viewer.render(md)
          document.documentElement.setAttribute('data-render-mode', 'extension')
          return
        }
        if (++tries < 5) { setTimeout(tick, 100); return }
        document.documentElement.setAttribute('data-render-mode', 'fallback')
        viewer.hidden = true
        fallback.hidden = false
        document.getElementById('fallback-css').media = 'all'
        const s = document.createElement('script')
        s.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js'
        s.onload = () => { fallback.innerHTML = marked.parse(md) }
        document.head.appendChild(s)
      })()
    </script>
  </body>
</html>
